version: "3.9"

services:
  db:
    image: postgres:15-alpine
    container_name: offline-sewa-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-sewa}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-sewa}
      POSTGRES_DB: ${POSTGRES_DB:-offline_sewa}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/migrations:/docker-entrypoint-initdb.d:ro

  backend:
    build: ./backend
    container_name: offline-sewa-backend
    restart: unless-stopped
    depends_on:
      - db
    env_file:
      - ./backend/.env
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  postgres_data:
